name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'lib/src/rules/**'
      - 'lib/src/fixes/**'
      - 'example/lib/**'
      - 'lib/many_lints.dart'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Generate rule pages from source
        run: bun run docs/scripts/generate-rule-pages.mjs --force

      - name: Build docs
        working-directory: docs
        run: bun run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
